<header class="header">

    <div class="header-content">

        <div class="brand">

            <img src="../assets/logo.png"

            <div>

                <h1>Riwayat Absensi</h1>

                <p>Masjid Al-Amin Sidosermo</p>

            </div>

        </div>

        <div class="admin-user">

            👤 Admin Takmir

    </div>

</header>



<nav class="navbar">

    <ul>

        <li>

            <a href="admin.html">

<li>

</li>

<main class="container">

    <section class="card">

        <h2>

            📋 Riwayat Absensi Takmir

        </h2>

        <div class="filter-grid">

            <div>

                <label>

                    Cari Nama

                </label>

                <input
                    type="text"
                    id="searchNama"
                    placeholder="Masukkan nama...">

            </div>

            <div>

                <label>

                    Filter Tanggal

                </label>

                <input
                    type="date"
                    id="filterTanggal">

            </div>

            <div class="filter-button">

                <button
                    id="btnReset"
                    class="btn">

                    Reset

                </button>

            </div>

        </div>

    </section>



    <section class="card">

        <div class="table-responsive">

            <table class="ranking-table">

                <thead>

                    <tr>
    <th>No</th>
    <th>Nama</th>
    <th>Tanggal</th>
    <th>Subuh</th>
    <th>Dzuhur</th>
    <th>Ashar</th>
    <th>Maghrib</th>
    <th>Isya</th>
    <th>Total</th>
    
</tr>

                </thead>

                <tbody id="riwayatBody">

                    <tr>

                        <td colspan="9">

                            Memuat data...

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </section>
