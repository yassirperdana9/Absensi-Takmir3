<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login Admin | Absensi Takmir</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">

    <!-- Favicon -->
    <link rel="icon" href="../assets/favicon.png">

</head>

<body>

<!-- ==========================================================
LOGIN
========================================================== -->

<div class="login-container">

    <div class="login-card">

        <!-- Logo -->

        <img src="../assets/logo.png"
             class="login-logo"
             alt="Logo Masjid">

        <h1>

            Absensi Shalat Fardhu

        </h1>

        <h2>

            Takmir Masjid Al-Amin Sidosermo

        </h2>

        <!-- Form -->

        <form id="loginForm">

            <div class="form-group">

                <label>

                    Username

                </label>

                <input
                    type="text"
                    id="username"
                    placeholder="Masukkan Username"
                    autocomplete="username"
                    required>

            </div>

            <div class="form-group">

                <label>

                    Password

                </label>

                <input
                    type="password"
                    id="password"
                    placeholder="Masukkan Password"
                    autocomplete="current-password"
                    required>

            </div>

            <button
                type="submit"
                class="btn-login">

                Login

            </button>

        </form>

        <!-- Pesan -->

        <p id="loginMessage"
           class="login-message"></p>

    </div>

</div>

<footer>

    © 2026 Takmir Masjid Al-Amin Sidosermo

</footer>

<script src="../js/login.js"></script>

</body>

</html>
